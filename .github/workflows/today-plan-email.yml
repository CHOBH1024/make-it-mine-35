name: 오늘의 계획 이메일 발송

on:
  push:
    paths:
      - '.github/plan-trigger'
  workflow_dispatch:

jobs:
  send-plan-email:
    runs-on: ubuntu-latest
    steps:
      - name: 오늘의 업무 계획 이메일 발송
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          kst_str = now.strftime('%Y-%m-%d %H:%M')

          html = f"""
          <div style="font-family:sans-serif;max-width:720px;margin:0 auto;color:#1a1a1a">
            <div style="background:linear-gradient(135deg,#1e3a5f,#2d5986);color:white;padding:20px 28px;border-radius:12px 12px 0 0">
              <p style="margin:0 0 4px;font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px">가정연합 목회자유형 진단 시스템</p>
              <h1 style="margin:0;font-size:18px">📋 오늘의 업무 계획 — 5인 팀 분업표</h1>
              <p style="margin:6px 0 0;opacity:0.8;font-size:12px">서진 → 여보짱 | {kst_str} KST</p>
            </div>
            <div style="border:1px solid #e5e7eb;border-top:none;padding:24px;background:white;border-radius:0 0 12px 12px">
              <p style="color:#374151;font-size:14px;margin-top:0">오늘 <strong>2시간마다 5회</strong> 진행 보고 예정. 각 팀원 3가지 과제 배분 완료.</p>

              <div style="border-left:4px solid #3b82f6;padding:12px 16px;margin:16px 0;background:#eff6ff;border-radius:0 8px 8px 0">
                <p style="margin:0 0 8px;font-weight:bold;color:#1d4ed8">⚙️ 우성 — 인프라·구현 담당</p>
                <ol style="margin:0;padding-left:20px;color:#1e3a5f;font-size:14px;line-height:2">
                  <li>EQ 25문항 UI 구현 — DiagnosisView.tsx 진행도 바 + 차원별 3점 척도 버튼 전면 교체</li>
                  <li>VIA 검색 필터 추가 — 강점 목록 상단에 실시간 필터 입력창 구현</li>
                  <li>TypeScript 빌드 오류 점검 및 최종 검증</li>
                </ol>
              </div>

              <div style="border-left:4px solid #10b981;padding:12px 16px;margin:16px 0;background:#ecfdf5;border-radius:0 8px 8px 0">
                <p style="margin:0 0 8px;font-weight:bold;color:#065f46">🔍 지성 — 리서치·초안 담당</p>
                <ol style="margin:0;padding-left:20px;color:#064e3b;font-size:14px;line-height:2">
                  <li>에니어그램 9유형 키워드 태그 최종 문구 확정 (예: 1유형 = "원칙·완벽")</li>
                  <li>Big5 점수→레벨 변환 기준표 인라인 텍스트 작성 (60%↑=High / 40~60=Mid / 40%↓=Low)</li>
                  <li>앵커 8항목 핵심 질문 한 줄 힌트 문구 작성</li>
                </ol>
              </div>

              <div style="border-left:4px solid #f59e0b;padding:12px 16px;margin:16px 0;background:#fffbeb;border-radius:0 8px 8px 0">
                <p style="margin:0 0 8px;font-weight:bold;color:#92400e">🎨 짱구 — 기획·테스트 담당</p>
                <ol style="margin:0;padding-left:20px;color:#78350f;font-size:14px;line-height:2">
                  <li>EQ 모달 25문항 UX 흐름 기획 검토 (차원 구분, 진행바, 레벨 뱃지)</li>
                  <li>진단 5개 도구 완주 시나리오 전체 테스트 (에니어그램→Big5→앵커→VIA→EQ)</li>
                  <li>아키타입 3~9번 dna·활동 확장 내용 현장 언어 적합성 검수</li>
                </ol>
              </div>

              <div style="border-left:4px solid #ef4444;padding:12px 16px;margin:16px 0;background:#fef2f2;border-radius:0 8px 8px 0">
                <p style="margin:0 0 8px;font-weight:bold;color:#991b1b">🛡️ 김치워리어 — PM·코드감사 담당</p>
                <ol style="margin:0;padding-left:20px;color:#7f1d1d;font-size:14px;line-height:2">
                  <li>오늘 작업 우선순위 조율 및 팀 진행 상황 모니터링</li>
                  <li>EQ useEffect 자동 반영 로직 코드 감사 (calcEQLevel → inputs.eq 갱신)</li>
                  <li>isReady 완료 조건 5개 도구 정상 작동 여부 확인</li>
                </ol>
              </div>

              <div style="border-left:4px solid #8b5cf6;padding:12px 16px;margin:16px 0;background:#f5f3ff;border-radius:0 8px 8px 0">
                <p style="margin:0 0 8px;font-weight:bold;color:#5b21b6">👑 서진 — 총괄·배포 담당</p>
                <ol style="margin:0;padding-left:20px;color:#4c1d95;font-size:14px;line-height:2">
                  <li>오늘 작업 완료 후 main 브랜치 병합 및 Lovable 배포 확인</li>
                  <li>2시간 중간 보고 5회 정상 발송 모니터링</li>
                  <li>내일 Phase 3 계획 수립 (진단 결과 UI 고도화)</li>
                </ol>
              </div>

              <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:16px;margin-top:20px">
                <p style="margin:0;font-weight:bold;color:#0369a1">🎯 오늘의 완료 목표</p>
                <ul style="margin:8px 0 0;padding-left:20px;color:#0c4a6e;font-size:14px;line-height:1.8">
                  <li>EQ 25문항 진단 UI 완전 구현</li>
                  <li>나머지 4개 도구 결과 해석 가이드 추가 (에니어그램 키워드 / Big5 변환표 / 앵커 힌트 / VIA 검색)</li>
                  <li>전체 진단 흐름 테스트 통과 후 main 배포</li>
                </ul>
              </div>
            </div>
            <p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:8px">
              5인 팀 오늘의 계획 | 서진 자동 보고 시스템 | {kst_str} KST
            </p>
          </div>
          """

          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          subject = "[서진 출근 브리핑] 오늘 5인 팀 업무 계획 — 각자 3가지 과제"
          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From'] = 'nokira1024@gmail.com'
          msg['To'] = 'nokira1024@gmail.com'
          msg.attach(MIMEText(html, 'html', 'utf-8'))

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login('nokira1024@gmail.com', os.environ['GMAIL_APP_PASSWORD'])
              server.sendmail('nokira1024@gmail.com', ['nokira1024@gmail.com'], msg.as_string())
              print("✅ 오늘의 계획 이메일 발송 완료")
          PYEOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
