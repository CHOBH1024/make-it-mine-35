name: 정밀 보고서 발송

on:
  push:
    paths:
      - '.github/full-report-trigger'
  workflow_dispatch:

jobs:
  send-full-report:
    runs-on: ubuntu-latest
    steps:
      - name: 정밀 보고서 이메일 발송
