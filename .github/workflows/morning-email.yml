name: 서진 아침 출근 브리핑 이메일

on:
  push:
    paths:
      - '.trigger-morning-email'
  workflow_dispatch:

jobs:
  send-morning-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: HTML 생성
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          kst_str = now.strftime('%Y-%m-%d %H:%M')
          kst_date = now.strftime('%Y년 %m월 %d일')
          weekday = ['월', '화', '수', '목', '금', '토', '일'][now.weekday()]

          # 최근 커밋 10개
          r1 = subprocess.run(['git', 'log', '--oneline', '-10', '--format=%s|||%ar|||%h'],
              capture_output=True, text=True)
          commits = []
          for line in r1.stdout.strip().split('\n'):
              if '|||' in line:
                  parts = line.split('|||')
                  if len(parts) == 3:
                      commits.append({'msg': parts[0], 'when': parts[1], 'hash': parts[2]})

          # 24시간 내 커밋
          r2 = subprocess.run(['git', 'log', '--since=24 hours ago', '--format=%s'],
              capture_output=True, text=True)
          recent = [l.strip() for l in r2.stdout.strip().split('\n') if l.strip()]

          # 변경 파일
          r3 = subprocess.run(['git', 'diff', '--name-only', 'HEAD~5', 'HEAD'],
              capture_output=True, text=True)
          changed = [f.strip() for f in r3.stdout.strip().split('\n') if f.strip()]

          commit_rows = ''
          for i, c in enumerate(commits[:7]):
              bg = '#eff6ff' if i == 0 else 'white'
              msg = c['msg'].replace('<', '&lt;').replace('>', '&gt;')
              commit_rows += f'<tr style="background:{bg}"><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-size:13px">{msg}</td><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-size:12px;white-space:nowrap">{c["when"]}</td><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;color:#9ca3af;font-size:11px;font-family:monospace">{c["hash"]}</td></tr>'

          if recent:
              items = ''.join(f'<li style="line-height:1.9;font-size:13px">{x}</li>' for x in recent)
              yesterday_box = f'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px 18px;margin:16px 0"><p style="margin:0 0 8px;font-weight:700;color:#166534">완료 작업 ({len(recent)}건)</p><ul style="margin:0;padding-left:20px;color:#14532d">{items}</ul></div>'
          else:
              yesterday_box = '<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin:16px 0"><p style="margin:0;color:#6b7280;font-size:13px">어제 새 커밋 없음</p></div>'

          if changed:
              fitems = ''.join(f'<li style="font-family:monospace;font-size:12px;color:#374151;line-height:1.8">{f}</li>' for f in changed[:10])
              files_box = f'<div style="margin-top:16px"><p style="font-weight:700;color:#374151;margin-bottom:6px">최근 변경 파일</p><ul style="margin:0;padding-left:18px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:10px 10px 10px 28px">{fitems}</ul></div>'
          else:
              files_box = ''

          html = f"""<div style="font-family:sans-serif;max-width:720px;margin:0 auto;color:#1a1a1a">
            <div style="background:linear-gradient(135deg,#1e3a5f 0%,#1e40af 100%);color:white;padding:24px 28px;border-radius:12px 12px 0 0">
              <p style="margin:0 0 4px;font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:2px">가정연합 목회자유형 진단 시스템</p>
              <h1 style="margin:0 0 6px;font-size:20px">아침 출근 브리핑</h1>
              <p style="margin:0;opacity:0.85;font-size:13px">{kst_date} ({weekday}요일) | 서진 팀장 보고</p>
            </div>
            <div style="border:1px solid #e5e7eb;border-top:none;padding:24px 28px;background:white;border-radius:0 0 12px 12px">
              <div style="background:linear-gradient(90deg,#fef3c7,#fffbeb);border-left:4px solid #f59e0b;padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:20px">
                <p style="margin:0;font-size:13px;color:#92400e"><strong>오늘의 사명 키워드:</strong> 정착 · 섬김 · 성장 | 섭리는 지금도 흐르고 있다</p>
              </div>
              {yesterday_box}
              <p style="font-weight:700;color:#374151;margin:20px 0 8px">최근 커밋 이력</p>
              <table style="width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
                <thead><tr style="background:#f8fafc">
                  <th style="padding:8px 12px;border-bottom:2px solid #e5e7eb;text-align:left;font-size:12px">커밋 메시지</th>
                  <th style="padding:8px 12px;border-bottom:2px solid #e5e7eb;text-align:left;font-size:12px">시간</th>
                  <th style="padding:8px 12px;border-bottom:2px solid #e5e7eb;text-align:left;font-size:12px">해시</th>
                </tr></thead>
                <tbody>{commit_rows}</tbody>
              </table>
              {files_box}
              <p style="font-weight:700;color:#374151;margin:24px 0 12px">오늘 5인 팀 집중 과제</p>
              <div style="border-left:4px solid #3b82f6;padding:10px 14px;background:#eff6ff;border-radius:0 8px 8px 0;margin-bottom:8px">
                <p style="margin:0 0 2px;font-weight:700;color:#1d4ed8;font-size:13px">우성 — 인프라·구현</p>
                <p style="margin:0;color:#1e3a5f;font-size:13px">코드 품질·빌드 안정성 유지, TypeScript 타입 검사, 신규 기능 구조 설계</p>
              </div>
              <div style="border-left:4px solid #10b981;padding:10px 14px;background:#ecfdf5;border-radius:0 8px 8px 0;margin-bottom:8px">
                <p style="margin:0 0 2px;font-weight:700;color:#065f46;font-size:13px">지성 — 리서치·초안</p>
                <p style="margin:0;color:#064e3b;font-size:13px">라이브러리 탐색, UX 개선안 문서화, 기능 초안 빠르게 구현</p>
              </div>
              <div style="border-left:4px solid #f59e0b;padding:10px 14px;background:#fffbeb;border-radius:0 8px 8px 0;margin-bottom:8px">
                <p style="margin:0 0 2px;font-weight:700;color:#92400e;font-size:13px">짱구 — 기획·테스트</p>
                <p style="margin:0;color:#78350f;font-size:13px">사역 콘텐츠 검수, 진단 흐름 전체 테스트, 결과 화면 UX 기획</p>
              </div>
              <div style="border-left:4px solid #ef4444;padding:10px 14px;background:#fef2f2;border-radius:0 8px 8px 0;margin-bottom:8px">
                <p style="margin:0 0 2px;font-weight:700;color:#991b1b;font-size:13px">김치워리어 — PM·코드감사</p>
                <p style="margin:0;color:#7f1d1d;font-size:13px">버그 추적, 코드 리뷰, 보안 점검, 우선순위 조율</p>
              </div>
              <div style="border-left:4px solid #8b5cf6;padding:10px 14px;background:#f5f3ff;border-radius:0 8px 8px 0">
                <p style="margin:0 0 2px;font-weight:700;color:#5b21b6;font-size:13px">서진 — 총괄·배포</p>
                <p style="margin:0;color:#4c1d95;font-size:13px">작업 통합, 브랜치 병합, 배포 확인, 하루 마감 보고</p>
              </div>
            </div>
            <p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:10px">아침 출근 브리핑 자동 발송 | {kst_str} KST</p>
          </div>"""

          payload = {
              'from': '서진 <onboarding@resend.dev>',
              'to': ['nokira1024@gmail.com'],
              'subject': f'[서진 아침 브리핑] {kst_date} ({weekday}) 출근했습니다',
              'html': html
          }
          with open('/tmp/morning_payload.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False)
          print('payload 생성 완료')
          PYEOF

      - name: Resend API로 이메일 발송
        run: |
          RESPONSE=$(curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/morning_payload.json)
          echo "API 응답: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if 'id' in r:
              print('이메일 발송 성공 — ID:', r['id'])
          else:
              print('발송 실패:', r)
              sys.exit(1)
          "
